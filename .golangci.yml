version: "2"
run:
  # Match the build tags the code compiles with (see Makefile GOFLAGS).
  build-tags:
    - grocksdb_clean_link
linters:
  default: all
  disable:
    - err113
    - exhaustruct
    - godot
    - godox
    - ireturn
    - mnd
    - nlreturn
    - paralleltest
    - testpackage
    - thelper
    - noinlineerr
    - wsl_v5
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    # The rpcv1 (SQLite) and rpcv2 (RocksDB) trees must stay independent, and
    # the shared packages directly under internal/ must not depend on either
    # tree. Test files are exempt: a few shared handler tests use v1's SQLite
    # as their fixture backend until #883's parity harness replaces them.
    depguard:
      rules:
        shared-internal:
          files:
            - "**/cmd/stellar-rpc/internal/**"
            - "!**/cmd/stellar-rpc/internal/rpcv1/**"
            - "!**/cmd/stellar-rpc/internal/rpcv2/**"
            - "!$test"
          deny:
            - pkg: github.com/stellar/stellar-rpc/cmd/stellar-rpc/internal/rpcv1
              desc: shared packages under internal/ must not import the rpcv1 tree
            - pkg: github.com/stellar/stellar-rpc/cmd/stellar-rpc/internal/rpcv2
              desc: shared packages under internal/ must not import the rpcv2 tree
        rpcv1-tree:
          files:
            - "**/cmd/stellar-rpc/internal/rpcv1/**"
            - "**/cmd/stellar-rpc/rpcv1/**"
            - "!$test"
          deny:
            - pkg: github.com/stellar/stellar-rpc/cmd/stellar-rpc/internal/rpcv2
              desc: the rpcv1 tree and the v1 binary must not import the rpcv2 tree
        rpcv2-tree:
          files:
            - "**/cmd/stellar-rpc/internal/rpcv2/**"
            - "**/cmd/stellar-rpc/rpcv2/**"
            - "!$test"
          deny:
            - pkg: github.com/stellar/stellar-rpc/cmd/stellar-rpc/internal/rpcv1
              desc: the rpcv2 tree and the v2 binary must not import the rpcv1 tree
    cyclop:
      max-complexity: 15
    dogsled:
      max-blank-identifiers: 3
    dupl:
      threshold: 100
    exhaustive:
      default-signifies-exhaustive: true
    forbidigo:
      forbid:
        - pattern: ^(fmt\.Print(|f|ln)|print|println)$
          msg: Do not commit debug print statements (in tests use t.Log()).
        - pattern: ^.*$
          pkg: ^github.com/stellar/go-stellar-sdk/support/errors$
          msg: Do not use stellar/go-stellar-sdk/support/errors, use the standard 'errors' package and fmt.Errorf().
      exclude-godoc-examples: false
      analyze-types: true
    funlen:
      lines: 100
      statements: 50
    misspell:
      locale: US
    testifylint:
      enable-all: true
      disable:
        - go-require
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
      ignore-sig-regexps:
        - \.New.*Error\(
      ignore-package-globs:
        - encoding/*
        - github.com/pkg/*
        - github.com/stellar/*
      ignore-interface-regexps:
        - ^(?i)c(?-i)ach(ing|e)
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gochecknoglobals
          - gosec
          - mnd
          - nosprintfhostport
        path: ^(.*_test\.go|cmd/stellar-rpc/internal/rpcv1/integrationtest/infrastructure/.*)$
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/stellar/)
        - localmodule
      custom-order: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
