# =============================================================================
# Stellar Full-History Backfill Pipeline — Configuration
# =============================================================================
#
# Usage:
#   stellar-rpc --mode=full-history-backfill --config backfill-config.toml \
#     --start-ledger 2 --end-ledger 30_000_001 --workers 40
#
# TOML defines data layout and storage paths — must be stable across runs.
# CLI flags define per-run parameters (range, workers, retries).

# =============================================================================
# [service] — Base data directory
# =============================================================================
#
# All default paths for meta store and storage are derived from default_data_dir.
# You can override each individually below.
#
# REQUIRED — no default.

[service]
default_data_dir = "/data/stellar-rpc"


# =============================================================================
# [meta_store] — RocksDB state tracking
# =============================================================================
#
# Tracks per-chunk and per-index ingestion state for crash recovery.
# WAL is always enabled.
#
# Default: {default_data_dir}/meta/rocksdb

[meta_store]
# path = "/data/stellar-rpc/meta/rocksdb"


# =============================================================================
# [backfill] — Layout parameters (stable across runs)
# =============================================================================

[backfill]

# Number of chunks per txhash index group. Controls RecSplit index cadence.
# Must not change after first run — changing invalidates existing txhash
# index boundaries.
#
# Default: 1000 (10M ledgers per index at 10K chunk size)
# chunks_per_txhash_index = 1000


# =============================================================================
# [immutable_storage.*] — Per-type storage paths
# =============================================================================
#
# Each data type has its own directory tree. Chunk-level files are grouped
# into bucket subdirectories of 1,000 chunks each.
#
# Defaults are derived from default_data_dir.

[immutable_storage.ledgers]
# path = "/data/stellar-rpc/ledgers"

[immutable_storage.events]
# path = "/data/stellar-rpc/events"

[immutable_storage.txhash_raw]
# path = "/data/stellar-rpc/txhash/raw"

[immutable_storage.txhash_index]
# path = "/data/stellar-rpc/txhash/index"


# =============================================================================
# [backfill.bsb] — GCS BufferedStorageBackend (required)
# =============================================================================
#
# Reads ledger close metas from Google Cloud Storage via BSB.

[backfill.bsb]

# GCS bucket path — bare path, no gs:// prefix.
# REQUIRED.
bucket_path = "sdf-ledger-close-meta/v1/ledgers/pubnet"

# Prefetch buffer depth per connection.
# Default: 1000
buffer_size = 1000

# Download workers per connection.
# Default: 20
num_workers = 20


# =============================================================================
# [logging] — Log output and verbosity
# =============================================================================

[logging]
# log_file = "/data/stellar-rpc/logs/backfill.log"
# error_file = "/data/stellar-rpc/logs/backfill-error.log"
max_scope_depth = 0
