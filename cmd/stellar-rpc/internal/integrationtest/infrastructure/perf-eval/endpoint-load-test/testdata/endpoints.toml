# Blaster roster for the endpoint load-test leg: every read-path endpoint the
# leg blasts (in serial), with its RPS envelope. Blaster steps each endpoint
# from start_rps (the min) to rps (the max) over --ramp-up, then holds rps for
# the rest of --duration.
#
# PLACEHOLDER VALUES: the real per-endpoint load profile is TBD; these exist so
# the leg runs end to end. input_data_path is intentionally absent -- the
# runner passes --input-data-path (setting both is a blaster error).

[endpoints.getHealth]
rps = 15
start_rps = 10

[endpoints.getLatestLedger]
rps = 15
start_rps = 10

[endpoints.getNetwork]
rps = 15
start_rps = 10

[endpoints.getVersionInfo]
rps = 15
start_rps = 10

[endpoints.getFeeStats]
rps = 15
start_rps = 5

[endpoints.getLedgerEntries]
rps = 15
start_rps = 5

[endpoints.getTransaction]
rps = 15
start_rps = 5

# The paginated endpoints take a limit
[endpoints.getTransactions]
rps = 1
start_rps = 1
limit = 1

[endpoints.getLedgers]
rps = 1
start_rps = 1
limit = 1

[endpoints.getEvents]
rps = 1
start_rps = 1
limit = 1
