# v27 apply-load config: Soroswap Soroban scenario, with meta enabled so the
# output is an ingestible LedgerCloseMeta corpus.
#
# Run in a dedicated work dir:
#   stellar-core apply-load --conf <this file>
# This emits meta.xdr (a stream of LedgerCloseMeta). The benchmark closes
# exactly APPLY_LOAD_NUM_LEDGERS ledgers at the end, so the *last*
# APPLY_LOAD_NUM_LEDGERS frames of meta.xdr are the corpus.
#
# Scenario profile: 250 soroban (Soroswap swap) txs/ledger + 1000 classic
# payment txs/ledger.

# Select the apply-load mode and benchmark model transaction.
APPLY_LOAD_MODE="benchmark"
APPLY_LOAD_MODEL_TX="soroswap"

# Perf knobs (do not affect generated transaction content).
APPLY_LOAD_TIME_WRITES = true
DISABLE_SOROBAN_METRICS_FOR_TESTING = true

# --- Meta ENABLED (this is what makes the output ingestible) ---
# NB: do NOT set DISABLE_TX_META_FOR_TESTING; BUILD_TESTS forces tx meta on,
# which we want. LOG_FILE_PATH="" sends logs to stdout.
METADATA_OUTPUT_STREAM = 'meta.xdr'
METADATA_DEBUG_LEDGERS = 0
LOG_FILE_PATH = ""

# Soroban txs per ledger for this scenario. Soroswap has no batching, so
# APPLY_LOAD_MAX_SOROBAN_TX_COUNT is the soroban TPL directly.
APPLY_LOAD_MAX_SOROBAN_TX_COUNT = 250

# Classic payment txs per ledger (same for all three scenarios).
APPLY_LOAD_CLASSIC_TXS_PER_LEDGER = 1000

# Number of parallel transaction clusters.
APPLY_LOAD_LEDGER_MAX_DEPENDENT_TX_CLUSTERS = 1

# Number of benchmark ledgers to close.
APPLY_LOAD_NUM_LEDGERS = 1000

# Disable bucket list pre-generation (not needed for benchmark mode).
APPLY_LOAD_BL_SIMULATED_LEDGERS = 0
APPLY_LOAD_BL_WRITE_FREQUENCY = 0
APPLY_LOAD_BL_BATCH_SIZE = 0
APPLY_LOAD_BL_LAST_BATCH_SIZE = 0
APPLY_LOAD_BL_LAST_BATCH_LEDGERS = 0

# Common apply-load boilerplate.
ARTIFICIALLY_GENERATE_LOAD_FOR_TESTING=true
ENABLE_SOROBAN_DIAGNOSTIC_EVENTS = false
# Must cover MAX_SOROBAN_TX_COUNT + 1 + CLASSIC_TXS_PER_LEDGER (~1251 here).
GENESIS_TEST_ACCOUNT_COUNT = 21000

# Minimal core config boilerplate.
UNSAFE_QUORUM=true
HTTP_PORT=11628
# NB: the apply-load command hard-overrides NETWORK_PASSPHRASE to "Apply Load"
# (stellar-core CommandLine.cpp runApplyLoad), so this value is cosmetic and
# CANNOT be used to make tx hashes differ between scenarios.
NETWORK_PASSPHRASE="Apply Load"
NODE_SEED="SDQVDISRYN2JXBS7ICL7QJAEKB3HWBJFP2QECXG7GZICAHBK4UNJCWK2 self"

[QUORUM_SET]
THRESHOLD_PERCENT=100
VALIDATORS=["$self"]
