# shellcheck shell=bash
# shellcheck disable=SC2034  # keys are read by campaign.sh after sourcing
#
# Example campaign config. Copy this file, adjust the keys, and run:
#
#   BENCH=/mnt/nvme/bench ./scripts/bench-devbox/campaign.sh my-campaign.cfg
#
# Add --dry-run to print every command the campaign would execute without
# building, downloading, or benchmarking anything.
#
# A config is a sourced bash fragment; set only the keys documented here.
# The authoritative key reference is the header comment of campaign.sh.

# Campaign name (required). Results land in
# $BENCH/results/<NAME>-<sha>-<stamp>/ and the bundle tarball carries the
# same run id.
NAME=example

# Git ref to benchmark. Default: the current checkout. The ref is built into
# a versioned binary ($BENCH/bin/stellar-rpc-<sha>) and the original checkout
# is restored afterwards — REF selects the binary under test, nothing else.
#REF=main

# Which ingest benchmarks to run per (dataset, chunk): cold | hot | both |
# none (required).
INGEST=both

# Whether to run the query benchmark suites after ingest: yes | no
# (required). Query-hot additionally needs the hot DB a hot ingest leaves
# behind, so it only runs when INGEST is hot or both.
QUERY=no

# Pace the hot ingest at a fixed ledger close interval, e.g. 2s. Default 0 =
# unpaced catch-up ingestion.
#CLOSE_INTERVAL=2s

# Repetitions per (dataset, chunk) cell. Default 5.
#RUNS=5

# Query tuning, used only when QUERY=yes: concurrency sweep list and
# per-benchmark iteration counts. Defaults shown.
#QC=1,4,16
#COLD_ITERS=100
#HOT_ITERS=200

# bench-ingest cold --workers. Default 1.
#WORKERS=1

# Cap the hot ingest at this many ledgers. Default 0 = the whole range.
#HOT_NUM_LEDGERS=0

# Publish the finished bundle to object storage (gs:// or s3://) via
# publish.sh. Default empty = keep results local.
#PUBLISH_URI=gs://my-bucket/benchmarks

# Datasets to benchmark: "name|kind|location|chunks" entries, where chunks is
# a space-separated chunk-ID list. The most common kinds:
#   packs-local  location is a local cold pack root (the directory holding
#                ledgers/, events/, txhash/); used in place.
#   packs-gs     location is a gs:// prefix of the same tree, fetched once
#                into $BENCH/golden/<name>/ and reused across runs.
# See campaign.sh's header for the full list of dataset kinds.
DATASETS=(
  "mydata|packs-gs|gs://my-bucket/ledgers/mydata/packs/cold|1 2"
)
