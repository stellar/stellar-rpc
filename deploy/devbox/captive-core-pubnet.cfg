# Captive-core config for the full-history v2 daemon, PUBLIC network.
#
# Validator set: the three SDF validators only (deliberate devbox choice —
# a minimal watcher quorum). Keys, addresses, and history commands copied
# verbatim from the SDF-maintained stellar/quickstart repo
# (pubnet/stellar-rpc/etc/stellar-captive-core.cfg @ main, fetched 2026-07-16),
# which also carries the full Tier-1 list if a stronger quorum is wanted later.
#
# Keep this file free of HTTP_PORT / HTTP_QUERY_PORT / QUERY_* / PEER_PORT /
# BUCKET_DIR_PATH: the daemon injects those from the RPC TOML's [ingestion]
# section, and the SDK's strict captive-core handling errors when the file
# sets them too. NETWORK_PASSPHRASE must live HERE — the daemon reads it back
# from this file at startup and refuses to start without it.

NETWORK_PASSPHRASE="Public Global Stellar Network ; September 2015"

[[HOME_DOMAINS]]
HOME_DOMAIN = "www.stellar.org"
QUALITY = "HIGH"

[[VALIDATORS]]
NAME = "SDF 1"
PUBLIC_KEY = "GCGB2S2KGYARPVIA37HYZXVRM2YZUEXA6S33ZU5BUDC6THSB62LZSTYH"
ADDRESS = "core-live-a.stellar.org:11625"
HISTORY = "curl -sf http://history.stellar.org/prd/core-live/core_live_001/{0} -o {1}"
HOME_DOMAIN = "www.stellar.org"

