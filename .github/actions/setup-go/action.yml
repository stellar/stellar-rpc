name: 'Setup the Go environment'
description: 'Installs go, libzstd, librocksdb, and restores/saves the build/module cache'
inputs:
  go-arch:
    description: 'Target Go architecture (used for native lib cache keys when cross-compiling)'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    # ImageOS (e.g. ubuntu22, ubuntu24) isn't in ${{ env.* }} until exported.
    - name: Detect OS version
      if: runner.os == 'Linux'
      shell: bash
      run: echo "ImageOS=${ImageOS}" >> $GITHUB_ENV

    # --- libzstd ---
    - name: Cache libzstd
      if: runner.os == 'Linux'
      id: cache-zstd
      uses: actions/cache@v4
      with:
        path: ~/.zstd
        key: libzstd-1.5.7-${{ runner.os }}-${{ env.ImageOS }}-${{ inputs.go-arch || runner.arch }}-${{ hashFiles('scripts/install-zstd.sh') }}

    - name: Build libzstd from source
      if: runner.os == 'Linux' && steps.cache-zstd.outputs.cache-hit != 'true'
      shell: bash
      run: PREFIX="$HOME/.zstd" ./scripts/install-zstd.sh

    - name: Install libzstd (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: ./scripts/install-zstd.sh

    # --- librocksdb ---
    # System deps (snappy, lz4, zlib) aren't cached — install on every run.
    - name: Install RocksDB link deps
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq libsnappy-dev liblz4-dev zlib1g-dev

    - name: Cache librocksdb
      if: runner.os == 'Linux'
      id: cache-rocksdb
      uses: actions/cache@v4
      with:
        path: ~/.rocksdb
        key: librocksdb-10.9.1-${{ runner.os }}-${{ env.ImageOS }}-${{ inputs.go-arch || runner.arch }}-${{ hashFiles('scripts/install-rocksdb.sh') }}

    - name: Build librocksdb from source
      if: runner.os == 'Linux' && steps.cache-rocksdb.outputs.cache-hit != 'true'
      shell: bash
      run: PREFIX="$HOME/.rocksdb" ZSTD_HOME="$HOME/.zstd" ./scripts/install-rocksdb.sh

    - name: Install librocksdb (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: ./scripts/install-rocksdb.sh

    # --- CGO flags + LD_LIBRARY_PATH ---
    # Libs are in ~/.zstd and ~/.rocksdb (not /usr/local), so the
    # compiler and dynamic linker need explicit paths.
    - name: Configure CGO for native libs
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "CGO_CFLAGS=-I$HOME/.zstd/include -I$HOME/.rocksdb/include" >> $GITHUB_ENV
        echo "CGO_LDFLAGS=-L$HOME/.zstd/lib -L$HOME/.rocksdb/lib" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=$HOME/.zstd/lib:$HOME/.rocksdb/lib" >> $GITHUB_ENV

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        # unfortunately we cannot use the provided caching because it uses the
        # same cache for all workflows/jobs, leading to undesired cache clashes,
        # causing uncached test runs etc ...
        # You can see the cache key at https://github.com/actions/setup-go/blob/4e0b6c77c6448caafaff5eed51516cad78e7639a/src/cache-restore.ts#L34
        # There is a ticket to add prefixes for the cache, which should solve it https://github.com/actions/setup-go/issues/358
        cache: false

    # Restore original modification time of files based on the date of the most
    # recent commit that modified them as mtimes affect the Go test cache.
    # See https://github.com/golang/go/issues/58571 for details
    - name: Restore modification time of checkout files
      uses: chetan/git-restore-mtime-action@075f9bc9d159805603419d50f794bd9f33252ebe


    # KEY_PREFIX must uniquely identify the specific instance of a job executing.
    - shell: bash
      run: |
        echo 'KEY_PREFIX=${{ github.workflow }}-${{ github.job }}-${{ runner.os }}-${{ inputs.go-version }}-matrix(${{ join(matrix.*,'|') }})' >> $GITHUB_OUTPUT
        echo "GOCACHE=$(go env GOCACHE)" >> $GITHUB_OUTPUT
        echo "GOMODCACHE=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT
        if [ ${{ runner.os }} != 'Windows' ]; then echo SUDO='sudo' >> $GITHUB_OUTPUT; fi
      id: variables

    # Cache the Go Modules downloaded during the job.
    - uses: actions/cache@v4
      with:
        path: ${{ steps.variables.outputs.GOMODCACHE }}
        key: ${{ steps.variables.outputs.KEY_PREFIX }}-go-mod-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ steps.variables.outputs.KEY_PREFIX  }}-go-mod-

    # Cache any build and test artifacts during the job, which will speed up
    # rebuilds and cause test runs to skip tests that have no reason to rerun.
    - uses: actions/cache@v4
      with:
        path: ${{ steps.variables.outputs.GOCACHE }}
        key: ${{ steps.variables.outputs.KEY_PREFIX  }}-go-build-${{ github.ref }}-${{ hashFiles('**', '!.git') }}
        restore-keys: |
          ${{ steps.variables.outputs.KEY_PREFIX }}-go-build-${{ github.ref }}-
          ${{ steps.variables.outputs.KEY_PREFIX }}-go-build-

    # Reset the cache for master/protected branches, to ensure they build and run the tests from zero
    # and that the module cache is cleaned (otherwise it accumulates orphan dependencies over time).
    - if: github.ref_protected
      shell: bash
      run: ${{ steps.variables.outputs.SUDO }} rm -rf ${{ steps.variables.outputs.GOMODCACHE }} ${{ steps.variables.outputs.GOCACHE  }}
