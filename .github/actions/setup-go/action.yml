name: 'Setup the Go environment'
description: 'Installs go, libzstd, librocksdb, and restores/saves the build/module cache'
inputs:
  go-version:
    description: 'Go toolchain version to install'
    required: false
    default: '1.26'
  go-arch:
    description: 'Target Go architecture (used for native lib cache keys when cross-compiling)'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    # Runner-only env var; export it so the native-lib cache keys below can
    # include it and invalidate when the image (and its toolchain) rotates.
    - name: Detect runner image version
      if: runner.os == 'Linux' || runner.os == 'macOS'
      shell: bash
      run: echo "ImageOS=${ImageOS}" >> "$GITHUB_ENV"

    # Normalize the target arch to Go's naming (amd64/arm64) so a job that
    # omits go-arch shares one native-lib cache with the Build leg for that
    # arch. runner.arch reports GitHub's naming (X64/ARM64).
    - name: Resolve target architecture
      shell: bash
      run: |
        arch="${{ inputs.go-arch }}"
        if [ -z "$arch" ]; then
          case "${{ runner.arch }}" in
            X64)   arch=amd64 ;;
            ARM64) arch=arm64 ;;
            *)     arch="$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')" ;;
          esac
        fi
        echo "TARGET_ARCH=$arch" >> "$GITHUB_ENV"
        # Darwin's -DCMAKE_OSX_ARCHITECTURES wants x86_64, not amd64.
        if [ "${{ runner.os }}" = macOS ]; then
          [ "$arch" = amd64 ] && echo "MACOS_ARCH=x86_64" >> "$GITHUB_ENV"
          [ "$arch" = arm64 ] && echo "MACOS_ARCH=arm64"  >> "$GITHUB_ENV"
        fi

    # --- libzstd ---
    - name: Cache libzstd
      if: runner.os == 'Linux' || runner.os == 'macOS'
      id: cache-zstd
      uses: actions/cache@v4
      with:
        path: ~/.zstd
        key: libzstd-1.5.7-${{ runner.os }}-${{ env.ImageOS }}-${{ env.TARGET_ARCH }}-${{ hashFiles('scripts/install-zstd.sh') }}

    - name: Build libzstd from source (Linux)
      if: runner.os == 'Linux' && steps.cache-zstd.outputs.cache-hit != 'true'
      shell: bash
      run: PREFIX="$HOME/.zstd" ./scripts/install-zstd.sh

    # From source (not brew) so it's pinned and built for the target arch,
    # which the x86_64 leg needs when cross-compiling on arm64 runners.
    - name: Build libzstd from source (macOS)
      if: runner.os == 'macOS' && steps.cache-zstd.outputs.cache-hit != 'true'
      shell: bash
      run: PREFIX="$HOME/.zstd" ./scripts/install-zstd.sh

    # --- librocksdb ---
    # No snappy/lz4/zlib install: the Go side uses the grocksdb_clean_link
    # tag (GOFLAGS, below), which drops grocksdb's `-lsnappy -llz4 -lz`, and
    # our librocksdb is built with zstd only.
    - name: Cache librocksdb
      if: runner.os == 'Linux' || runner.os == 'macOS'
      id: cache-rocksdb
      uses: actions/cache@v4
      with:
        # Hash install-zstd.sh too: RocksDB links ~/.zstd, so a zstd bump
        # must invalidate this cache and force a matching rebuild.
        path: ~/.rocksdb
        key: librocksdb-10.9.1-${{ runner.os }}-${{ env.ImageOS }}-${{ env.TARGET_ARCH }}-${{ hashFiles('scripts/install-rocksdb.sh', 'scripts/install-zstd.sh') }}

    - name: Build librocksdb from source (Linux)
      if: runner.os == 'Linux' && steps.cache-rocksdb.outputs.cache-hit != 'true'
      shell: bash
      run: PREFIX="$HOME/.rocksdb" ZSTD_HOME="$HOME/.zstd" ./scripts/install-rocksdb.sh

    - name: Build librocksdb from source (macOS)
      if: runner.os == 'macOS' && steps.cache-rocksdb.outputs.cache-hit != 'true'
      shell: bash
      run: PREFIX="$HOME/.rocksdb" ZSTD_HOME="$HOME/.zstd" ./scripts/install-rocksdb.sh

    # ~/.zstd and ~/.rocksdb aren't on the default search path, so pass them
    # explicitly.
    - name: Configure CGO for native libs (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "CGO_CFLAGS=-I$HOME/.zstd/include -I$HOME/.rocksdb/include" >> "$GITHUB_ENV"
        echo "CGO_LDFLAGS=-L$HOME/.zstd/lib -L$HOME/.rocksdb/lib" >> "$GITHUB_ENV"
        echo "LD_LIBRARY_PATH=$HOME/.zstd/lib:$HOME/.rocksdb/lib" >> "$GITHUB_ENV"

    # No DYLD_LIBRARY_PATH: SIP strips DYLD_* when /bin/bash is exec'd, and
    # CI only links the binary (never runs it), so it isn't needed.
    - name: Configure CGO for native libs (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        echo "CGO_CFLAGS=-I$HOME/.zstd/include -I$HOME/.rocksdb/include" >> "$GITHUB_ENV"
        echo "CGO_LDFLAGS=-L$HOME/.zstd/lib -L$HOME/.rocksdb/lib" >> "$GITHUB_ENV"

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        # unfortunately we cannot use the provided caching because it uses the
        # same cache for all workflows/jobs, leading to undesired cache clashes,
        # causing uncached test runs etc ...
        # You can see the cache key at https://github.com/actions/setup-go/blob/4e0b6c77c6448caafaff5eed51516cad78e7639a/src/cache-restore.ts#L34
        # There is a ticket to add prefixes for the cache, which should solve it https://github.com/actions/setup-go/issues/358
        cache: false

    # Build grocksdb with clean_link for every go command in the job (build,
    # test, CodeQL autobuild, golangci-lint). Mirrors the Makefile.
    - name: Set GOFLAGS
      shell: bash
      run: echo "GOFLAGS=-tags=grocksdb_clean_link" >> "$GITHUB_ENV"

    # Restore original modification time of files based on the date of the most
    # recent commit that modified them as mtimes affect the Go test cache.
    # See https://github.com/golang/go/issues/58571 for details
    - name: Restore modification time of checkout files
      uses: chetan/git-restore-mtime-action@075f9bc9d159805603419d50f794bd9f33252ebe


    # KEY_PREFIX must uniquely identify the specific instance of a job executing.
    - shell: bash
      run: |
        echo 'KEY_PREFIX=${{ github.workflow }}-${{ github.job }}-${{ runner.os }}-${{ inputs.go-version }}-matrix(${{ join(matrix.*,'|') }})' >> $GITHUB_OUTPUT
        echo "GOCACHE=$(go env GOCACHE)" >> $GITHUB_OUTPUT
        echo "GOMODCACHE=$(go env GOMODCACHE)" >> $GITHUB_OUTPUT
        echo SUDO='sudo' >> $GITHUB_OUTPUT
      id: variables

    # Cache the Go Modules downloaded during the job.
    - uses: actions/cache@v4
      with:
        path: ${{ steps.variables.outputs.GOMODCACHE }}
        key: ${{ steps.variables.outputs.KEY_PREFIX }}-go-mod-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ steps.variables.outputs.KEY_PREFIX  }}-go-mod-

    # Cache any build and test artifacts during the job, which will speed up
    # rebuilds and cause test runs to skip tests that have no reason to rerun.
    - uses: actions/cache@v4
      with:
        path: ${{ steps.variables.outputs.GOCACHE }}
        key: ${{ steps.variables.outputs.KEY_PREFIX  }}-go-build-${{ github.ref }}-${{ hashFiles('**', '!.git') }}
        restore-keys: |
          ${{ steps.variables.outputs.KEY_PREFIX }}-go-build-${{ github.ref }}-
          ${{ steps.variables.outputs.KEY_PREFIX }}-go-build-

    # Reset the cache for master/protected branches, to ensure they build and run the tests from zero
    # and that the module cache is cleaned (otherwise it accumulates orphan dependencies over time).
    - if: github.ref_protected
      shell: bash
      run: ${{ steps.variables.outputs.SUDO }} rm -rf ${{ steps.variables.outputs.GOMODCACHE }} ${{ steps.variables.outputs.GOCACHE  }}
