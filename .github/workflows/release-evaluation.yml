name: Release Evaluation
# Overarching release-evaluation suite for release/** branches. Builds the
# stellar-rpc binary once, coordinates the per-area jobs, and aggregates a gated
# report. Today only the Core apply-load synthetic ingestion area runs real work
# (by dispatching the ephemeral-EC2 load-test workflow); the other areas are
# explicit neutral/TBD placeholders whose tooling lands in later branches.

defaults:
  run:
    shell: bash

on:
  push:
    branches: [release/**]
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Release ref/branch/SHA to evaluate (default: triggering ref)'
        required: false
        type: string
        default: ''
      baseline_ref:
        description: 'Baseline ref to compare against'
        required: false
        type: string
        default: 'main'
      profile:
        description: 'Evaluation profile / scenario set'
        required: false
        type: choice
        options: [quick, standard, full]
        default: standard
      threshold_mode:
        description: 'Threshold gating mode (overrides thresholds.yml)'
        required: false
        type: choice
        options: [off, warn, enforce]
        default: warn

# release/** is protected, so this keys on github.sha there (distinct release
# commits never cancel each other). The apply-load child carries its own
# non-cancelling group so a cancel here can never evict its running EC2 box.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_protected == 'true' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write        # the apply-load reusable call needs OIDC; not inherited unless granted here
  contents: read
  pull-requests: write   # report PR comment + the load-test child's launch/result comments

jobs:
  build:
    name: Build stellar-rpc binary
    runs-on: ubuntu-24.04
    timeout-minutes: 40   # cold build on protected refs: setup-go and rust-cache wipe caches
    outputs:
      target_sha: ${{ steps.ctx.outputs.target_sha }}
      target_ref: ${{ steps.ctx.outputs.target_ref }}
      pr_number: ${{ steps.ctx.outputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref || github.sha }}
          fetch-depth: 0

      - name: Resolve target context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ inputs.release_ref || github.ref_name }}
        run: |
          SHA="$(git rev-parse HEAD)"
          PR="$(gh pr list --repo "${{ github.repository }}" --state open \
                  --head "$REF" --json number --jq '.[0].number // ""' 2>/dev/null || true)"
          {
            echo "target_sha=$SHA"
            echo "target_ref=$REF"
            echo "pr_number=$PR"
          } >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-go
      - run: rustup update
      - uses: stellar/actions/rust-cache@main
      - run: make build-libs

      - name: Build stellar-rpc binary
        run: make build-stellar-rpc

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: stellar-rpc-binary
          path: stellar-rpc
          retention-days: 7
          if-no-files-found: error

  placeholder-areas:
    name: ${{ matrix.area }} (placeholder)
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - area: endpoint-benchmarks
            reason: 'TBD placeholder — needs wiring'
          - area: bench-comparison
            reason: 'TBD placeholder — no baseline-comparison tooling yet'
          - area: mainnet-backfill
            reason: 'TBD placeholder — no CI driver for mainnet backfill ingestion yet'
          - area: blaster-request-load
            reason: 'TBD placeholder — stellar-rpc-blaster wired in yet'
    steps:
      - name: Download stellar-rpc binary
        uses: actions/download-artifact@v4
        with:
          name: stellar-rpc-binary
          path: ./bin

      - name: Emit neutral status + stub metrics
        env:
          AREA: ${{ matrix.area }}
          REASON: ${{ matrix.reason }}
        run: |
          chmod +x ./bin/stellar-rpc
          ./bin/stellar-rpc version || true   # prove the built binary is wired through
          mkdir -p out
          jq -n --arg area "$AREA" --arg reason "$REASON" \
            '{area: $area, status: "neutral", reason: $reason, metrics: {}}' > out/status.json

      - name: Upload area status
        uses: actions/upload-artifact@v4
        with:
          name: area-${{ matrix.area }}
          path: out/
          if-no-files-found: error

  apply-load:
    name: Core apply-load synthetic ingestion
    needs: build
    # Dispatches the ephemeral-EC2 load test and awaits its verdict. The child
    # workflow's own non-cancelling concurrency group protects the running box.
    uses: ./.github/workflows/load-test.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    with:
      target_sha: ${{ needs.build.outputs.target_sha }}
      target_ref: ${{ needs.build.outputs.target_ref }}

  report:
    name: Release evaluation report
    needs: [build, placeholder-areas, apply-load]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.target_sha || github.sha }}

      # Self-contained: the gate compiles from the checkout, so the report still
      # works even if the build job failed (all areas then skipped). The
      # releaseeval package is stdlib-only, so no make build-libs / rust-cache.
      - uses: ./.github/actions/setup-go

      - name: Download all area artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # The gate is an env-guarded Go test (releaseeval.TestReleaseGate): its exit
      # code is the gate. RELEASE_EVAL_RUN lets it run here but skip in normal CI.
      - name: Aggregate, summarize, and gate
        env:
          RELEASE_EVAL_RUN: '1'
          GH_TOKEN: ${{ github.token }}
          THRESHOLD_MODE: ${{ inputs.threshold_mode || '' }}
          PROFILE: ${{ inputs.profile || 'standard' }}
          BASELINE_REF: ${{ inputs.baseline_ref || 'main' }}
          PR_NUMBER: ${{ needs.build.outputs.pr_number }}
          APPLY_RESULT: ${{ needs.apply-load.result }}
          APPLY_PASSED: ${{ needs.apply-load.outputs.passed }}
          APPLY_FOUND: ${{ needs.apply-load.outputs.found }}
        run: go test ./cmd/stellar-rpc/internal/releaseeval/ -run TestReleaseGate -count=1

      - name: Upload aggregated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evaluation-report
          path: aggregated/
          if-no-files-found: warn
