name: Stellar RPC

defaults:
  run:
    shell: bash

on:
  pull_request:
  push:
    branches: [ main, release/** ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_protected == 'true' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # For pull requests, build and test the PR head not a merge of the PR with the destination.
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          # We need to full history for git-restore-mtime to know what modification dates to use.
          # Otherwise, the Go test cache will fail (due to the modification time of fixtures changing).
          fetch-depth: "0"
      - uses: ./.github/actions/setup-go
      - run: rustup update
      - uses: stellar/actions/rust-cache@main
      - run: make build-libs
      - run: go test -race -timeout 25m ./cmd/stellar-rpc/...

  build:
    name: Build
    strategy:
      # One platform failing shouldn't hide whether the others actually
      # pass. This used to matter a lot here: the Windows leg that used to
      # be in this matrix (see below) had never had zstd/RocksDB CI
      # support, and stayed invisibly broken for weeks because it kept
      # getting cancelled by macOS failing first, before fail-fast was
      # turned off.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            go_arch: amd64
          - os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            go_arch: arm64
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            go_arch: amd64
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            go_arch: arm64
          # No windows-latest leg: it was default CI-matrix boilerplate,
          # not an actual deployment target (no Windows packaging or
          # release artifact exists anywhere in this repo), and never had
          # working RocksDB support to begin with — the storage engine's
          # own design docs already note Windows doesn't reliably support
          # the deferred-unlink trick it depends on, with no workaround
          # ever built for it.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-go
        with:
          go-arch: ${{ matrix.go_arch }}

      - run: |
          rustup target add ${{ matrix.rust_target }}
          rustup update
      - uses: stellar/actions/rust-cache@main
      - run: make build-libs
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust_target }}

      - name: Build Stellar RPC reproducible build
        run: |
          go build -trimpath -buildvcs=false ./cmd/stellar-rpc
          ls -lh stellar-rpc
          file stellar-rpc
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.go_arch }}

  integration-p26-pkg:
    name: Integration tests (P26)
    uses: ./.github/workflows/integration-tests.yml
    with:
      protocol_version: '26'
      core_deb_version: '26.0.0-3089.8e43a2d3b.jammy'
      core_docker_img: 'stellar/stellar-core:26.0.0-3089.8e43a2d3b.jammy'

  integration-p27-pkg:
    name: Integration tests (P27)
    uses: ./.github/workflows/integration-tests.yml
    with:
      protocol_version: '27'
      core_deb_version: '27.0.0-3288.7696c069d.jammy'
      core_docker_img: 'stellar/stellar-core:27.0.0-3288.7696c069d.jammy'

  # integration-p25-src:
  #   name: Integration tests (p25, core from source)
  #   uses: ./.github/workflows/integration-tests.yml
  #   with:
  #     protocol_version: '25'
  #     core_git_ref: 'master'
