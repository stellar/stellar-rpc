name: Stellar RPC

defaults:
  run:
    shell: bash

on:
  pull_request:
  push:
    branches: [ main, release/** ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_protected == 'true' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    strategy:
      matrix:
        os: [ ubuntu-22.04 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # For pull requests, build and test the PR head not a merge of the PR with the destination.
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          # We need to full history for git-restore-mtime to know what modification dates to use.
          # Otherwise, the Go test cache will fail (due to the modification time of fixtures changing).
          fetch-depth: "0"
      - uses: ./.github/actions/setup-go
      - run: rustup update
      - uses: stellar/actions/rust-cache@main
      - run: make build-libs
      - run: go test -race -timeout 25m ./cmd/stellar-rpc/...

  build:
    name: Build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            go_arch: amd64
          - os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            go_arch: arm64
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            go_arch: amd64
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            go_arch: arm64
          - os: windows-latest
            rust_target: x86_64-pc-windows-gnu
            go_arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-go

      # Use cross-compiler for linux aarch64
      - if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        name: Install aarch64 cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-10-aarch64-linux-gnu
          echo 'CC=aarch64-linux-gnu-gcc-10' >> $GITHUB_ENV

      - run: |
          rustup target add ${{ matrix.rust_target }}
          rustup update
      - uses: stellar/actions/rust-cache@main
      - run: make build-libs
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust_target }}

      - name: Build Stellar RPC reproducible build
        run: |
          go build -trimpath -buildvcs=false ./cmd/stellar-rpc
          ls -lh stellar-rpc
          file stellar-rpc
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.go_arch }}

  integration-p27-pkg:
    name: Integration tests (P27)
    uses: ./.github/workflows/integration-tests.yml
    with:
      protocol_version: '27'
      core_deb_version: '27.0.0-3288.7696c069d.jammy'
      core_docker_img: 'stellar/stellar-core:27.0.0-3288.7696c069d.jammy'

  integration-p28-pkg:
    name: Integration tests (P28)
    uses: ./.github/workflows/integration-tests.yml
    with:
      protocol_version: '28'
      # Protocol 28 (CAP-0083) runs against the vnext (next-protocol-enabled)
      # core build. Plain vnext (no `~buildtests`) to mirror the plain
      # release deb / docker image used by the P27 leg above.
      #
      # Pinned to 3367 (3589a696b), which includes stellar-core#5329 — the
      # fix for the QueryServer.cpp:124 contiguous-snapshot assertion that
      # aborted captive-core catchup on builds 3313..3366.
      #
      # SPIKE (CAP-0084) DEFERRED: this is still the CAP-0083 vnext image; it
      # exercises RPC against a P28 core but NOT the CAP-0084 muxed-contract SAC
      # host behavior. Re-pin to the `e32fa423…`-prefixed `-vnext` build
      # (stellar/stellar-core#5332) once Jenkins publishes it — match the plain
      # `~vnext` variant, not `~buildtests`. No such build exists yet.
      core_deb_version: '27.0.1-3367.3589a696b.jammy~vnext'
      core_docker_img: 'stellar/unsafe-stellar-core:27.0.1-3367.3589a696b.jammy-vnext'

  # integration-p25-src:
  #   name: Integration tests (p25, core from source)
  #   uses: ./.github/workflows/integration-tests.yml
  #   with:
  #     protocol_version: '25'
  #     core_git_ref: 'master'
