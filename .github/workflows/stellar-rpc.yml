name: Stellar RPC

defaults:
  run:
    shell: bash

on:
  push:
    branches: [ main, release/** ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_protected == 'true' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    strategy:
      matrix:
        os: [ ubuntu-24.04 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # For pull requests, build and test the PR head not a merge of the PR with the destination.
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          # We need to full history for git-restore-mtime to know what modification dates to use.
          # Otherwise, the Go test cache will fail (due to the modification time of fixtures changing).
          fetch-depth: "0"
      - uses: ./.github/actions/setup-go
      - run: rustup update
      - uses: stellar/actions/rust-cache@main
      - run: make build-libs
      - run: go test -race -timeout 25m ./cmd/stellar-rpc/...

  build:
    name: Build
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            go_arch: amd64
          - os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            go_arch: arm64
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            go_arch: amd64
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            go_arch: arm64
          - os: windows-latest
            rust_target: x86_64-pc-windows-gnu
            go_arch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Install cross-compiler before setup-go so that libzstd and
      # librocksdb are built for the target architecture. Both CC and CXX
      # are set — RocksDB is C++ and needs g++, not just gcc.
      #
      # arm64 dev packages (snappy, lz4, zlib) are installed via dpkg
      # multi-arch so cmake can find target-architecture libraries when
      # building shared .so files. Without these, cmake finds x86 .so
      # files and the link fails with "file in wrong format".
      - if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        name: Install aarch64 cross-compilation toolchain
        run: |
          sudo dpkg --add-architecture arm64

          # The default Ubuntu repos (archive/security.ubuntu.com) only
          # serve amd64. ARM64 packages live at ports.ubuntu.com. Without
          # pinning, apt-get update fails with 404 for arm64 indices.
          # Fix: restrict existing sources to amd64, add arm64 via ports.
          #
          # Handle deb822 format (.sources files, Ubuntu 24.04 default).
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && sudo sed -i '/^Types:/a Architectures: amd64 i386' "$f"
          done
          # Handle traditional format (.list files).
          sudo sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list 2>/dev/null || true
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i 's/^deb http/deb [arch=amd64] http/' "$f"
          done

          cat <<'EOF' | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-backports main restricted universe multiverse
          EOF

          sudo apt-get update
          sudo apt-get install -y \
            gcc-10-aarch64-linux-gnu g++-10-aarch64-linux-gnu \
            libsnappy-dev:arm64 liblz4-dev:arm64 zlib1g-dev:arm64
          echo 'CC=aarch64-linux-gnu-gcc-10' >> $GITHUB_ENV
          echo 'CXX=aarch64-linux-gnu-g++-10' >> $GITHUB_ENV

      - uses: ./.github/actions/setup-go
        with:
          go-arch: ${{ matrix.go_arch }}

      - run: |
          rustup target add ${{ matrix.rust_target }}
          rustup update
      - uses: stellar/actions/rust-cache@main
      - run: make build-libs
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust_target }}

      - name: Build Stellar RPC reproducible build
        run: |
          go build -trimpath -buildvcs=false ./cmd/stellar-rpc
          ls -lh stellar-rpc
          file stellar-rpc
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.go_arch }}

  integration-p25-pkg:
    name: Integration tests (p25, packaged core)
    uses: ./.github/workflows/integration-tests.yml
    with:
      protocol_version: '25'
      core_version: '25.2.0-3058.bb195c49d.jammy'

  # integration-p25-src:
  #   name: Integration tests (p25, core from source)
  #   uses: ./.github/workflows/integration-tests.yml
  #   with:
  #     protocol_version: '25'
  #     core_git_ref: 'master'

  # To test previous protocol, add entries here, e.g.:
  # integration-p24-pkg:
  #   name: Integration tests (p24, packaged core)
  #   uses: ./.github/workflows/integration-tests.yml
  #   with:
  #     protocol_version: '24'
  #     core_version: '19.14.0-1526.ef4f31a28.jammy'
