name: Load test (ephemeral)
# Callable load-test leg: launches a c5.2xlarge, polls S3 for the result object
# the box publishes, and reports back to its caller via job outputs + that S3
# object. It does not post to the PR -- the coordinator owns human-facing output.
# Box bootstrap: run-load-test.sh; runner-side polling: runner/orchestrate.go.

on:
  # workflow_call is the only trigger: a leg runs through the coordinator.
  workflow_call:
    inputs:
      target_ref:
        description: 'Ref or SHA to benchmark (resolved to a SHA on checkout)'
        required: true
        type: string
      run_label:
        description: 'Leg label; folded into the S3 result key and instance name'
        required: true
        type: string
    secrets:
      AWS_GHA_ROLE_ARN:
        description: 'OIDC role ARN to assume for EC2 + S3 access'
        required: true
    outputs:
      passed:
        description: 'true when the instance reported an ok verdict'
        value: ${{ jobs.load-test.outputs.passed }}
      verdict:
        description: 'instance verdict ("ok"/"fail"), empty on timeout'
        value: ${{ jobs.load-test.outputs.verdict }}
      result_key:
        description: 'S3 key of this leg result.json (under the results bucket)'
        value: ${{ jobs.load-test.outputs.result_key }}
      bucket:
        description: 'S3 bucket holding the result object'
        value: ${{ jobs.load-test.outputs.bucket }}
      instance_id:
        description: 'EC2 instance id that was launched (for leak diagnostics)'
        value: ${{ jobs.load-test.outputs.instance_id }}

# Only the intrinsic infra permissions necessary
permissions:
  id-token: write   # OIDC AssumeRole into the GHA role
  contents: read    # checkout

# Non-cancelling group keyed on the tested commit + leg: the instance has no
# self-destruct (only this workflow's Terminate step reaps it), so a cancel
# mid-run would leak a c5.2xlarge. New runs queue instead. The leg label keeps
# parallel legs of one coordinator run in distinct groups.
concurrency:
  group: load-test-${{ inputs.target_ref }}-${{ inputs.run_label }}
  cancel-in-progress: false

jobs:
  load-test:
    name: Launch + await ephemeral load-test box
    outputs:
      passed: ${{ steps.results.outputs.passed }}
      verdict: ${{ steps.results.outputs.verdict }}
      result_key: ${{ steps.results.outputs.result_key }}
      bucket: ${{ steps.results.outputs.bucket }}
      instance_id: ${{ steps.launch.outputs.instance_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 225   # 210min results wait + buffer for boot/SSM/poll latency and cleanup (role lasts 240min)
    env:
      AWS_REGION: us-east-1
      INSTANCE_TYPE: c5.2xlarge
      ROOT_VOLUME_GB: 500
      BOOTSTRAP_VOLUME_IOPS: 3000
      # 3000 IOPS is the gp3 floor; 125 MiB/s alone would need only 500.
      BOOTSTRAP_VOLUME_THROUGHPUT: 125
      INSTANCE_PROFILE: stellar-rpc-ci-load-test
      TEST_TAG_KEY: test
      TEST_TAG_VAL: stellar-rpc-ci-load-test
      SSM_REGISTRATION_TIMEOUT: 240   # SSM agent registers ~30-90s after boot
      RESULTS_TIMEOUT: 12600          # 210 min wait: ~55m bootstrap+build + ~90m benchmark, under the 170m go-test budget.
      POLL_INTERVAL: 30
      DEBUG_LOG_LINES: 40
      DEBUG_LOG_EVERY_POLLS: 5
      LOAD_TEST_DIR: cmd/stellar-rpc/internal/integrationtest/infrastructure/perf-eval/ingest-load-test
      BUCKET: stellar-rpc-ci-load-test
      # run_label disambiguates legs that share this run's id/attempt.
      RESULT_KEY: runs/${{ github.run_id }}-${{ github.run_attempt }}/${{ inputs.run_label }}/result.json

    steps:
      # Harness (orchestrate, run-load-test.sh) and the benchmarked code come from
      # one SHA: target_ref is checked out here and the box rebuilds it. Tradeoff:
      # an ad-hoc dispatch against an old ref also runs that ref's harness.
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}

      - name: Resolve target SHA
        id: resolve
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # The runner-side half is `go run ... runner orchestrate`.
      - uses: ./.github/actions/setup-go

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 14400

      - name: Resolve latest Ubuntu 22.04 AMI
        id: ami
        run: |
          AMI=$(aws ec2 describe-images \
            --owners 099720109477 \
            --filters \
              "Name=name,Values=ubuntu/images/hvm-ssd*/ubuntu-jammy-22.04-amd64-server-*" \
              "Name=architecture,Values=x86_64" \
              "Name=state,Values=available" \
            --query 'sort_by(Images, &CreationDate)[-1].ImageId' \
            --output text)
          echo "ami=$AMI" >> "$GITHUB_OUTPUT"

      - name: Render user-data
        # The script ships verbatim; parameters travel in a two-line preamble so
        # the bytes that run on the box match the bytes in git.
        run: |
          {
            echo '#!/usr/bin/env bash'
            echo "export TARGET_SHA=${{ steps.resolve.outputs.sha }} RUN_ID=${{ github.run_id }}-${{ github.run_attempt }}"
            echo "export BUCKET=$BUCKET RESULT_KEY=$RESULT_KEY"
            cat "$LOAD_TEST_DIR/run-load-test.sh"
          } > /tmp/user-data.sh

      - name: Launch EC2 instance
        id: launch
        run: |
          COMMON_TAGS="{Key=$TEST_TAG_KEY,Value=$TEST_TAG_VAL},
            {Key=ref,Value=${{ inputs.target_ref }}},
            {Key=sha,Value=${{ steps.resolve.outputs.sha }}},
            {Key=run-id,Value=${{ github.run_id }}}"
          RUN_INSTANCES_JSON=$(aws ec2 run-instances \
            --image-id "${{ steps.ami.outputs.ami }}" \
            --instance-type "$INSTANCE_TYPE" \
            --iam-instance-profile "Name=$INSTANCE_PROFILE" \
            --user-data file:///tmp/user-data.sh \
            --instance-initiated-shutdown-behavior terminate \
            --block-device-mappings "[{
              \"DeviceName\":\"/dev/sda1\",
              \"Ebs\":{\"VolumeSize\":$ROOT_VOLUME_GB,\"VolumeType\":\"gp3\",\"Iops\":$BOOTSTRAP_VOLUME_IOPS,\"Throughput\":$BOOTSTRAP_VOLUME_THROUGHPUT,\"DeleteOnTermination\":true}
            }]" \
            --tag-specifications \
              "ResourceType=instance,Tags=[
                {Key=Name,Value=load-test-${{ inputs.run_label }}},
                $COMMON_TAGS
              ]" \
              "ResourceType=volume,Tags=[
                {Key=Name,Value=load-test-${{ inputs.run_label }}-root},
                $COMMON_TAGS
              ]" \
            --count 1 \
            --output json)

          INSTANCE_ID=$(printf '%s' "$RUN_INSTANCES_JSON" | jq -r '.Instances[0].InstanceId')
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM agent to register
        env:
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: |
          DEADLINE=$(( $(date +%s) + SSM_REGISTRATION_TIMEOUT ))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            PING=$(aws ssm describe-instance-information \
                     --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
                     --query 'InstanceInformationList[0].PingStatus' \
                     --output text 2>/dev/null || echo "")
            echo "[$(date -u +%FT%TZ)] ssm ping=$PING"
            if [ "$PING" = "Online" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::SSM agent never registered for $INSTANCE_ID — verify AmazonSSMManagedInstanceCore is attached to the stellar-rpc-ci-load-test role"
          exit 1

      # Polls S3 for the result object and relays verdict/passed + the result
      # location (bucket/key) as step outputs the coordinator reads.
      - name: Poll for results
        id: results
        env:
          INSTANCE_ID: ${{ steps.launch.outputs.instance_id }}
        run: go run "./$LOAD_TEST_DIR/runner" orchestrate

      - name: Write results summary
        if: always()
        run: |
          if [ -f /tmp/results.md ]; then
            cat /tmp/results.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f /tmp/timeout-comment.md ]; then
            cat /tmp/timeout-comment.md >> "$GITHUB_STEP_SUMMARY"
          fi

      # Standalone-debugging convenience: the result object also lives in S3, which
      # is what the coordinator reads.
      - name: Upload load-test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ inputs.run_label }}
          path: |
            /tmp/results.md
            /tmp/timeout-comment.md
            /tmp/bench-results.json
          if-no-files-found: warn

      - name: Fail leg on timeout or load-test failure
        if: always()
        run: |
          if [ "${{ steps.results.outputs.found }}" != "true" ]; then
            echo "Load test timed out before producing instance results"
            exit 1
          fi

          if [ "${{ steps.results.outputs.passed }}" != "true" ]; then
            echo "Instance reported a failing verdict"
            cat /tmp/results.md 2>/dev/null || true
            exit 1
          fi

      - name: Terminate instance
        if: always() && steps.launch.outputs.instance_id != ''
        run: |
          aws ec2 terminate-instances \
            --instance-ids ${{ steps.launch.outputs.instance_id }} || true
