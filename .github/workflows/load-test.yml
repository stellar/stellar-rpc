name: Load test (ephemeral)
# Runs from the apply-load branch itself so the workflow definition can evolve
# there without first landing on main. Launches a c5.2xlarge in Horizon
# (203618453975) that runs the apply-load integration test against the golden DB
# seed and writes results to /tmp/results.md, then signals /tmp/done and exits
# without terminating. This workflow polls the box via SSM Run Command, fetches
# the results, posts back to the PR when one exists, and terminates the instance.

on:
  push:
    branches: [apply-load]

permissions:
  id-token: write          # for OIDC AssumeRole into the GHA role
  contents: read
  pull-requests: write     # to post launch + result comments

jobs:
  load-test:
    name: Launch + await ephemeral load-test box
    runs-on: ubuntu-latest
    timeout-minutes: 130   # 120min results wait + buffer for boot/SSM/poll latency and cleanup
    env:
      AWS_REGION: us-east-1
      INSTANCE_TYPE: c5.2xlarge
      ROOT_VOLUME_GB: 500
      BOOTSTRAP_VOLUME_IOPS: 3000
      BOOTSTRAP_VOLUME_THROUGHPUT: 500
      BENCH_VOLUME_THROUGHPUT: 125
      INSTANCE_PROFILE: stellar-rpc-ci-load-test
      TEST_TAG_KEY: test
      TEST_TAG_VAL: stellar-rpc-ci-load-test
      SSM_REGISTRATION_TIMEOUT: 240   # 4 min — SSM agent registers ~30-90s after boot
      RESULTS_TIMEOUT: 7200           # 120 min total wait for /tmp/done on cold-start boxes
      POLL_INTERVAL: 30
      DEBUG_LOG_LINES: 40
      DEBUG_LOG_EVERY_POLLS: 5

    steps:
      - name: Resolve target context
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARGET_SHA="${{ github.sha }}"
          CHECKOUT_REF="$TARGET_SHA"
          REF_NAME="${{ github.ref_name }}"
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --base main \
            --head "$REF_NAME" \
            --json number \
            --jq '.[0].number // ""' 2>/dev/null || true)

          if [ -n "$PR_NUMBER" ]; then
            RUN_LABEL="pr${PR_NUMBER}"
            PR_TAG_VALUE="$PR_NUMBER"
          else
            RUN_LABEL="$REF_NAME"
            PR_TAG_VALUE="none"
          fi

          echo "sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_tag_value=$PR_TAG_VALUE" >> "$GITHUB_OUTPUT"
          echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "run_label=$RUN_LABEL" >> "$GITHUB_OUTPUT"

      - name: Checkout target ref
        # Use the branch/PR head under test instead of the default ref for the
        # triggering event.
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.checkout_ref }}

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 14400

      - name: Resolve latest Ubuntu 22.04 AMI
        id: ami
        run: |
          AMI=$(aws ec2 describe-images \
            --owners 099720109477 \
            --filters \
              "Name=name,Values=ubuntu/images/hvm-ssd*/ubuntu-jammy-22.04-amd64-server-*" \
              "Name=architecture,Values=x86_64" \
              "Name=state,Values=available" \
            --query 'sort_by(Images, &CreationDate)[-1].ImageId' \
            --output text)
          echo "ami=$AMI" >> "$GITHUB_OUTPUT"

      - name: Render user-data.sh
        # Source script lives next to the integration test it bootstraps,
        # so it stays in sync with apply-load.cfg and the test code.
        run: |
          sed \
            -e "s|__TARGET_SHA__|${{ steps.target.outputs.sha }}|g" \
            -e "s|__PR_NUMBER__|${{ steps.target.outputs.pr_number }}|g" \
            -e "s|__RUN_ID__|${{ github.run_id }}|g" \
            cmd/stellar-rpc/internal/integrationtest/infrastructure/load-test/user-data.sh \
            > /tmp/user-data.sh

      - name: Launch EC2 instance
        id: launch
        run: |
          RUN_INSTANCES_JSON=$(aws ec2 run-instances \
            --image-id "${{ steps.ami.outputs.ami }}" \
            --instance-type "$INSTANCE_TYPE" \
            --iam-instance-profile "Name=$INSTANCE_PROFILE" \
            --user-data file:///tmp/user-data.sh \
            --block-device-mappings "[{
              \"DeviceName\":\"/dev/sda1\",
              \"Ebs\":{\"VolumeSize\":$ROOT_VOLUME_GB,\"VolumeType\":\"gp3\",\"Iops\":$BOOTSTRAP_VOLUME_IOPS,\"Throughput\":$BOOTSTRAP_VOLUME_THROUGHPUT,\"DeleteOnTermination\":true}
            }]" \
            --tag-specifications \
              "ResourceType=instance,Tags=[
                {Key=$TEST_TAG_KEY,Value=$TEST_TAG_VAL},
                {Key=Name,Value=load-test-${{ steps.target.outputs.run_label }}},
                {Key=pr,Value=${{ steps.target.outputs.pr_tag_value }}},
                {Key=ref,Value=${{ steps.target.outputs.ref_name }}},
                {Key=sha,Value=${{ steps.target.outputs.sha }}},
                {Key=run-id,Value=${{ github.run_id }}}
              ]" \
              "ResourceType=volume,Tags=[
                {Key=$TEST_TAG_KEY,Value=$TEST_TAG_VAL},
                {Key=Name,Value=load-test-${{ steps.target.outputs.run_label }}-root},
                {Key=pr,Value=${{ steps.target.outputs.pr_tag_value }}},
                {Key=ref,Value=${{ steps.target.outputs.ref_name }}},
                {Key=sha,Value=${{ steps.target.outputs.sha }}},
                {Key=run-id,Value=${{ github.run_id }}}
              ]" \
            --count 1 \
            --output json)

          INSTANCE_ID=$(printf '%s' "$RUN_INSTANCES_JSON" | jq -r '.Instances[0].InstanceId')
          ROOT_DEVICE_NAME=$(printf '%s' "$RUN_INSTANCES_JSON" | jq -r '.Instances[0].RootDeviceName')
          ROOT_VOLUME_ID=$(printf '%s' "$RUN_INSTANCES_JSON" | jq -r --arg root "$ROOT_DEVICE_NAME" '
            (
              [
                (.Instances[0].BlockDeviceMappings[]? | select(.DeviceName == $root) | .Ebs.VolumeId),
                .Instances[0].BlockDeviceMappings[0].Ebs.VolumeId
              ]
              | map(select(. != null and . != ""))
              | .[0]
            ) // empty
          ')

          if [ -z "$ROOT_VOLUME_ID" ]; then
            for _ in 1 2 3 4 5 6; do
              ROOT_VOLUME_ID=$(aws ec2 describe-instances \
                --instance-ids "$INSTANCE_ID" \
                --query "Reservations[0].Instances[0].BlockDeviceMappings[?DeviceName=='$ROOT_DEVICE_NAME'].Ebs.VolumeId | [0]" \
                --output text 2>/dev/null || true)
              if [ -n "$ROOT_VOLUME_ID" ] && [ "$ROOT_VOLUME_ID" != "None" ]; then
                break
              fi
              ROOT_VOLUME_ID=""
              sleep 5
            done
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "root_volume_id=$ROOT_VOLUME_ID" >> "$GITHUB_OUTPUT"
          if [ -z "$ROOT_VOLUME_ID" ]; then
            echo "::warning::Could not determine root volume id for $INSTANCE_ID"
          fi

      - name: Acknowledge launch in PR
        if: steps.target.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh pr comment ${{ steps.target.outputs.pr_number }} \
            --repo ${{ github.repository }} \
            --body "⏳ Load test launching on \`${{ steps.launch.outputs.instance_id }}\` (commit \`${{ steps.target.outputs.sha }}\`).
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Posting results when the run finishes."; then
            echo "::warning::Failed to post launch comment to PR #${{ steps.target.outputs.pr_number }}"
          fi

      - name: Wait for SSM agent to register
        # If this step times out, the instance profile most likely lacks the
        # AmazonSSMManagedInstanceCore managed policy — fix that and retry.
        run: |
          INSTANCE=${{ steps.launch.outputs.instance_id }}
          DEADLINE=$(( $(date +%s) + SSM_REGISTRATION_TIMEOUT ))
          while [ $(date +%s) -lt $DEADLINE ]; do
            PING=$(aws ssm describe-instance-information \
                     --filters "Key=InstanceIds,Values=$INSTANCE" \
                     --query 'InstanceInformationList[0].PingStatus' \
                     --output text 2>/dev/null || echo "")
            echo "[$(date -u +%FT%TZ)] ssm ping=$PING"
            if [ "$PING" = "Online" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::SSM agent never registered for $INSTANCE — verify AmazonSSMManagedInstanceCore is attached to the stellar-rpc-ci-load-test role"
          exit 1

      - name: Poll for download marker / results
        id: results
        run: |
          INSTANCE=${{ steps.launch.outputs.instance_id }}
          ROOT_VOLUME=${{ steps.launch.outputs.root_volume_id }}
          DEADLINE=$(( $(date +%s) + RESULTS_TIMEOUT ))
          THROTTLE_ATTEMPTED=0
          THROTTLE_SIGNALLED=0
          THROTTLE_STARTED_AT=0
          THROTTLE_LAST_STATUS=""
          POLL_COUNT=0

          send_ssm_command() {
            local parameters_json="$1"
            local attempts="${2:-3}"
            local attempt=1
            local cmd_id=""

            while [ "$attempt" -le "$attempts" ]; do
              if cmd_id=$(aws ssm send-command \
                --instance-ids "$INSTANCE" \
                --document-name AWS-RunShellScript \
                --parameters "$parameters_json" \
                --query 'Command.CommandId' --output text 2>/dev/null); then
                printf '%s\n' "$cmd_id"
                return 0
              fi
              echo "[$(date -u +%FT%TZ)] ssm send-command attempt $attempt/$attempts failed"
              attempt=$((attempt + 1))
              sleep 5
            done

            return 1
          }

          signal_throttle_marker() {
            local marker_path="$1"
            local signal_params=""
            local signal_cmd_id=""
            local signal_status=""

            signal_params=$(jq -cn --arg marker "$marker_path" '{commands:["touch \($marker)"]}')
            if ! signal_cmd_id=$(send_ssm_command "$signal_params" 2); then
              return 1
            fi
            aws ssm wait command-executed --command-id "$signal_cmd_id" --instance-id "$INSTANCE" 2>/dev/null || true
            signal_status=$(aws ssm get-command-invocation \
              --command-id "$signal_cmd_id" --instance-id "$INSTANCE" \
              --query Status --output text 2>/dev/null || echo "")
            [ "$signal_status" = "Success" ]
          }

          fetch_debug_tail() {
            if ! DEBUG_CMD_ID=$(send_ssm_command "commands=[\"if [ -f /var/log/user-data.log ]; then tail -n $DEBUG_LOG_LINES /var/log/user-data.log; else echo __NO_DEBUG_LOG__; fi\"]"); then
              echo "__DEBUG_TAIL_UNAVAILABLE__"
              return 0
            fi
            aws ssm wait command-executed --command-id "$DEBUG_CMD_ID" --instance-id "$INSTANCE" 2>/dev/null || true
            aws ssm get-command-invocation \
              --command-id "$DEBUG_CMD_ID" --instance-id "$INSTANCE" \
              --query StandardOutputContent --output text 2>/dev/null || true
          }

          while [ $(date +%s) -lt $DEADLINE ]; do
            POLL_COUNT=$((POLL_COUNT + 1))
            if ! CMD_ID=$(send_ssm_command 'commands=["if [ -f /tmp/done ]; then cat /tmp/results.md; elif [ -f /tmp/download-complete ]; then echo __DOWNLOAD_COMPLETE__; else echo __NOT_READY__; fi"]'); then
              echo "[$(date -u +%FT%TZ)] failed to dispatch SSM poll command; retrying"
              sleep "$POLL_INTERVAL"
              continue
            fi
            aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE" 2>/dev/null || true
            OUT=$(aws ssm get-command-invocation \
                    --command-id "$CMD_ID" --instance-id "$INSTANCE" \
                    --query StandardOutputContent --output text 2>/dev/null || echo "")
            FIRST_LINE=$(printf '%s' "$OUT" | head -1)
            if [ -n "$OUT" ] && [ "$FIRST_LINE" != "__NOT_READY__" ]; then
              if [ "$FIRST_LINE" = "__DOWNLOAD_COMPLETE__" ]; then
                if [ -n "$ROOT_VOLUME" ]; then
                  THROTTLE_STATE=$(aws ec2 describe-volumes-modifications \
                    --region "$AWS_REGION" --volume-ids "$ROOT_VOLUME" \
                    --query 'VolumesModifications[0].ModificationState' --output text 2>/dev/null || true)
                  THROTTLE_TARGET=$(aws ec2 describe-volumes-modifications \
                    --region "$AWS_REGION" --volume-ids "$ROOT_VOLUME" \
                    --query 'VolumesModifications[0].TargetThroughput' --output text 2>/dev/null || true)
                  THROTTLE_CURRENT=$(aws ec2 describe-volumes \
                    --region "$AWS_REGION" --volume-ids "$ROOT_VOLUME" \
                    --query 'Volumes[0].Throughput' --output text 2>/dev/null || true)
                  THROTTLE_STATUS="state=${THROTTLE_STATE:-<none>} target=${THROTTLE_TARGET:-<none>} current=${THROTTLE_CURRENT:-<none>}"
                  if [ "$THROTTLE_STATUS" != "$THROTTLE_LAST_STATUS" ]; then
                    echo "[$(date -u +%FT%TZ)] __THROTTLE_STATUS__ $THROTTLE_STATUS"
                    THROTTLE_LAST_STATUS="$THROTTLE_STATUS"
                  fi
                else
                  THROTTLE_STATE=""
                  THROTTLE_TARGET=""
                  THROTTLE_CURRENT=""
                fi

                if [ -z "$ROOT_VOLUME" ]; then
                  if [ "$THROTTLE_SIGNALLED" -eq 0 ]; then
                    echo "[$(date -u +%FT%TZ)] __NO_ROOT_VOLUME_ID__"
                    if signal_throttle_marker /tmp/volume-throttle-failed; then
                      THROTTLE_SIGNALLED=1
                      THROTTLE_ATTEMPTED=1
                    else
                      echo "[$(date -u +%FT%TZ)] failed to signal missing root-volume id to instance; will retry"
                    fi
                  fi
                elif [ "$THROTTLE_SIGNALLED" -eq 0 ] \
                  && [ "$THROTTLE_CURRENT" = "$BENCH_VOLUME_THROUGHPUT" ] \
                  && { [ -z "$THROTTLE_TARGET" ] || [ "$THROTTLE_TARGET" = "$BENCH_VOLUME_THROUGHPUT" ]; } \
                  && [ "$THROTTLE_STATE" != "failed" ]; then
                  echo "[$(date -u +%FT%TZ)] __THROTTLE_CONFIRMED__ $THROTTLE_STATUS"
                  if signal_throttle_marker /tmp/volume-throttle-requested; then
                    THROTTLE_SIGNALLED=1
                    THROTTLE_ATTEMPTED=1
                  else
                    echo "[$(date -u +%FT%TZ)] failed to signal throttle confirmation to instance; will retry"
                  fi
                elif [ "$THROTTLE_SIGNALLED" -eq 0 ] && [ "$THROTTLE_STATE" = "failed" ]; then
                  echo "[$(date -u +%FT%TZ)] __MODIFY_FAILED__ $THROTTLE_STATUS"
                  if signal_throttle_marker /tmp/volume-throttle-failed; then
                    THROTTLE_SIGNALLED=1
                    THROTTLE_ATTEMPTED=1
                  else
                    echo "[$(date -u +%FT%TZ)] failed to signal throttle failure to instance; will retry"
                  fi
                elif [ "$THROTTLE_ATTEMPTED" -eq 0 ]; then
                  if aws ec2 modify-volume --region "$AWS_REGION" --volume-id "$ROOT_VOLUME" --throughput "$BENCH_VOLUME_THROUGHPUT"; then
                    echo "[$(date -u +%FT%TZ)] download complete; requested root-volume throughput change to $BENCH_VOLUME_THROUGHPUT MiB/s for $ROOT_VOLUME"
                    THROTTLE_ATTEMPTED=1
                    THROTTLE_STARTED_AT=$(date +%s)
                  else
                    echo "[$(date -u +%FT%TZ)] __MODIFY_FAILED__ modify-volume request failed for $ROOT_VOLUME"
                    if signal_throttle_marker /tmp/volume-throttle-failed; then
                      THROTTLE_SIGNALLED=1
                      THROTTLE_ATTEMPTED=1
                    else
                      echo "[$(date -u +%FT%TZ)] failed to signal modify-volume failure to instance; will retry"
                    fi
                  fi
                elif [ "$THROTTLE_SIGNALLED" -eq 0 ] \
                  && [ "$THROTTLE_STARTED_AT" -ne 0 ] \
                  && [ $(date +%s) -ge $(( THROTTLE_STARTED_AT + 900 )) ]; then
                  echo "[$(date -u +%FT%TZ)] __MODIFY_TIMEOUT__ $THROTTLE_STATUS"
                  if signal_throttle_marker /tmp/volume-throttle-failed; then
                    THROTTLE_SIGNALLED=1
                  else
                    echo "[$(date -u +%FT%TZ)] failed to signal throttle timeout to instance; will retry"
                  fi
                fi
                echo "[$(date -u +%FT%TZ)] download stage complete; waiting for /tmp/done"
                if [ $((POLL_COUNT % DEBUG_LOG_EVERY_POLLS)) -eq 0 ]; then
                  echo "[$(date -u +%FT%TZ)] debug tail from instance log"
                  fetch_debug_tail || true
                fi
                sleep "$POLL_INTERVAL"
                continue
              fi
              echo "[$(date -u +%FT%TZ)] result payload from instance"
              printf '%s\n' "$OUT"
              printf '%s' "$OUT" > /tmp/results.md
              echo "found=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "[$(date -u +%FT%TZ)] still waiting for /tmp/done"
            if [ $((POLL_COUNT % DEBUG_LOG_EVERY_POLLS)) -eq 0 ]; then
              echo "[$(date -u +%FT%TZ)] debug tail from instance log"
              fetch_debug_tail || true
            fi
            sleep "$POLL_INTERVAL"
          done
          fetch_debug_tail > /tmp/debug-tail.log || true
          echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Write results summary
        if: always()
        run: |
          if [ -f /tmp/results.md ]; then
            cat /tmp/results.md >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.results.outputs.found }}" = "false" ]; then
            {
              echo "### Load test timed out"
              echo
              echo "Instance: \`${{ steps.launch.outputs.instance_id }}\`"
              echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              if [ -s /tmp/debug-tail.log ]; then
                echo
                echo "Last ${DEBUG_LOG_LINES} lines of /var/log/user-data.log:"
                echo
                echo '```'
                cat /tmp/debug-tail.log
                echo '```'
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post results to PR
        if: steps.target.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.results.outputs.found }}" = "true" ]; then
            if ! gh pr comment ${{ steps.target.outputs.pr_number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/results.md; then
              echo "::warning::Failed to post results comment to PR #${{ steps.target.outputs.pr_number }}"
            fi
          else
            {
              echo "❌ Load test did not produce results within $RESULTS_TIMEOUT s."
              echo
              echo "Instance: \`${{ steps.launch.outputs.instance_id }}\`"
              echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              if [ -s /tmp/debug-tail.log ]; then
                echo
                echo "Last ${DEBUG_LOG_LINES} lines of /var/log/user-data.log:"
                echo
                echo '```'
                cat /tmp/debug-tail.log
                echo '```'
              fi
            } > /tmp/timeout-comment.md
            if ! gh pr comment ${{ steps.target.outputs.pr_number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/timeout-comment.md; then
              echo "::warning::Failed to post timeout comment to PR #${{ steps.target.outputs.pr_number }}"
            fi
          fi

      - name: Fail workflow on timeout or load-test failure
        if: always()
        run: |
          if [ "${{ steps.results.outputs.found }}" = "false" ]; then
            echo "Load test timed out before producing instance results"
            exit 1
          fi

          if [ ! -f /tmp/results.md ]; then
            echo "Expected /tmp/results.md to exist when results are found"
            exit 1
          fi

          if grep -q 'Ingest load test failed' /tmp/results.md; then
            echo "Load test returned a failure payload"
            cat /tmp/results.md
            exit 1
          fi

      - name: Terminate instance
        if: always() && steps.launch.outputs.instance_id != ''
        run: |
          aws ec2 terminate-instances \
            --instance-ids ${{ steps.launch.outputs.instance_id }} || true
