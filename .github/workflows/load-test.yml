name: Load test (ephemeral)
# Triggered by a PR comment containing "run load test".
# Launches a c5.2xlarge in Horizon (203618453975) that runs the apply-load
# integration test against the golden DB seed and writes results to
# /tmp/results.md, then signals /tmp/done and exits without terminating.
# This workflow polls the box via SSM Run Command, fetches the results,
# posts the PR comment, and terminates the instance.

on:
  issue_comment:
    types: [created]

permissions:
  id-token: write          # for OIDC AssumeRole into the GHA role
  contents: read
  pull-requests: write     # to post launch + result comments

jobs:
  load-test:
    name: Launch + await ephemeral load-test box
    if: >-
      github.event.issue.pull_request != null
      && contains(github.event.comment.body, 'run load test')
      && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 30    # 15min expected + buffer for boot/SSM/poll latency
    env:
      AWS_REGION: us-east-1
      INSTANCE_TYPE: c5.2xlarge
      ROOT_VOLUME_GB: 500
      BOOTSTRAP_VOLUME_IOPS: 3000
      BOOTSTRAP_VOLUME_THROUGHPUT: 500
      BENCH_VOLUME_THROUGHPUT: 125
      INSTANCE_PROFILE: stellar-rpc-ci-load-test
      TEST_TAG_KEY: test
      TEST_TAG_VAL: stellar-rpc-ci-load-test
      SSM_REGISTRATION_TIMEOUT: 240   # 4 min — SSM agent registers ~30-90s after boot
      RESULTS_TIMEOUT: 1500           # 25 min total wait for /tmp/done
      POLL_INTERVAL: 30

    steps:
      - name: Checkout PR head
        # issue_comment runs the workflow off main, but we need the PR's
        # tree (which contains the user-data.sh + apply-load.cfg under test).
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Resolve PR head SHA
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh pr view ${{ github.event.issue.number }} \
                  --repo ${{ github.repository }} \
                  --json headRefOid -q .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve latest Ubuntu 22.04 AMI
        id: ami
        run: |
          AMI=$(aws ec2 describe-images \
            --owners 099720109477 \
            --filters \
              "Name=name,Values=ubuntu/images/hvm-ssd*/ubuntu-jammy-22.04-amd64-server-*" \
              "Name=architecture,Values=x86_64" \
              "Name=state,Values=available" \
            --query 'sort_by(Images, &CreationDate)[-1].ImageId' \
            --output text)
          echo "ami=$AMI" >> "$GITHUB_OUTPUT"

      - name: Render user-data.sh
        # Source script lives next to the integration test it bootstraps,
        # so it stays in sync with apply-load.cfg and the test code.
        run: |
          sed \
            -e "s|__TARGET_SHA__|${{ steps.pr.outputs.sha }}|g" \
            -e "s|__PR_NUMBER__|${{ github.event.issue.number }}|g" \
            -e "s|__RUN_ID__|${{ github.run_id }}|g" \
            cmd/stellar-rpc/internal/integrationtest/infrastructure/load-test/user-data.sh \
            > /tmp/user-data.sh

      - name: Launch EC2 instance
        id: launch
        run: |
          RUN_INSTANCES_JSON=$(aws ec2 run-instances \
            --image-id "${{ steps.ami.outputs.ami }}" \
            --instance-type "$INSTANCE_TYPE" \
            --iam-instance-profile "Name=$INSTANCE_PROFILE" \
            --user-data file:///tmp/user-data.sh \
            --block-device-mappings "[{
              \"DeviceName\":\"/dev/sda1\",
              \"Ebs\":{\"VolumeSize\":$ROOT_VOLUME_GB,\"VolumeType\":\"gp3\",\"Iops\":$BOOTSTRAP_VOLUME_IOPS,\"Throughput\":$BOOTSTRAP_VOLUME_THROUGHPUT,\"DeleteOnTermination\":true}
            }]" \
            --tag-specifications \
              "ResourceType=instance,Tags=[
                {Key=$TEST_TAG_KEY,Value=$TEST_TAG_VAL},
                {Key=Name,Value=load-test-pr${{ github.event.issue.number }}},
                {Key=pr,Value=${{ github.event.issue.number }}},
                {Key=sha,Value=${{ steps.pr.outputs.sha }}},
                {Key=run-id,Value=${{ github.run_id }}}
              ]" \
              "ResourceType=volume,Tags=[
                {Key=$TEST_TAG_KEY,Value=$TEST_TAG_VAL},
                {Key=Name,Value=load-test-pr${{ github.event.issue.number }}-root},
                {Key=pr,Value=${{ github.event.issue.number }}},
                {Key=sha,Value=${{ steps.pr.outputs.sha }}},
                {Key=run-id,Value=${{ github.run_id }}}
              ]" \
            --count 1 \
            --output json)

          INSTANCE_ID=$(printf '%s' "$RUN_INSTANCES_JSON" | jq -r '.Instances[0].InstanceId')
          ROOT_DEVICE_NAME=$(printf '%s' "$RUN_INSTANCES_JSON" | jq -r '.Instances[0].RootDeviceName')
          ROOT_VOLUME_ID=$(printf '%s' "$RUN_INSTANCES_JSON" | jq -r --arg root "$ROOT_DEVICE_NAME" '
            (
              [
                (.Instances[0].BlockDeviceMappings[]? | select(.DeviceName == $root) | .Ebs.VolumeId),
                .Instances[0].BlockDeviceMappings[0].Ebs.VolumeId
              ]
              | map(select(. != null and . != ""))
              | .[0]
            ) // empty
          ')

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "root_volume_id=$ROOT_VOLUME_ID" >> "$GITHUB_OUTPUT"
          if [ -z "$ROOT_VOLUME_ID" ]; then
            echo "::warning::Could not determine root volume id from RunInstances response"
          fi

      - name: Acknowledge launch in PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "⏳ Load test launching on \`${{ steps.launch.outputs.instance_id }}\` (commit \`${{ steps.pr.outputs.sha }}\`).
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Posting results when the run finishes (~15 min)."

      - name: Wait for SSM agent to register
        # If this step times out, the instance profile most likely lacks the
        # AmazonSSMManagedInstanceCore managed policy — fix that and retry.
        run: |
          INSTANCE=${{ steps.launch.outputs.instance_id }}
          DEADLINE=$(( $(date +%s) + SSM_REGISTRATION_TIMEOUT ))
          while [ $(date +%s) -lt $DEADLINE ]; do
            PING=$(aws ssm describe-instance-information \
                     --filters "Key=InstanceIds,Values=$INSTANCE" \
                     --query 'InstanceInformationList[0].PingStatus' \
                     --output text 2>/dev/null || echo "")
            echo "[$(date -u +%FT%TZ)] ssm ping=$PING"
            if [ "$PING" = "Online" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "::error::SSM agent never registered for $INSTANCE — verify AmazonSSMManagedInstanceCore is attached to the stellar-rpc-ci-load-test role"
          exit 1

      - name: Poll for download marker / results
        id: results
        run: |
          INSTANCE=${{ steps.launch.outputs.instance_id }}
          ROOT_VOLUME=${{ steps.launch.outputs.root_volume_id }}
          DEADLINE=$(( $(date +%s) + RESULTS_TIMEOUT ))
          THROTTLE_ATTEMPTED=0
          while [ $(date +%s) -lt $DEADLINE ]; do
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE" \
              --document-name AWS-RunShellScript \
              --parameters 'commands=["if [ -f /tmp/done ]; then cat /tmp/results.md; elif [ -f /tmp/download-complete ]; then echo __DOWNLOAD_COMPLETE__; else echo __NOT_READY__; fi"]' \
              --query 'Command.CommandId' --output text)
            aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE" 2>/dev/null || true
            OUT=$(aws ssm get-command-invocation \
                    --command-id "$CMD_ID" --instance-id "$INSTANCE" \
                    --query StandardOutputContent --output text 2>/dev/null || echo "")
            FIRST_LINE=$(printf '%s' "$OUT" | head -1)
            if [ -n "$OUT" ] && [ "$FIRST_LINE" != "__NOT_READY__" ]; then
              if [ "$FIRST_LINE" = "__DOWNLOAD_COMPLETE__" ]; then
                if [ "$THROTTLE_ATTEMPTED" -eq 0 ]; then
                  if [ -n "$ROOT_VOLUME" ]; then
                    MODIFY_COMMAND="if aws ec2 modify-volume --region '$AWS_REGION' --volume-id '$ROOT_VOLUME' --throughput '$BENCH_VOLUME_THROUGHPUT'; then echo __MODIFY_SENT__; else echo __MODIFY_FAILED__; fi; touch /tmp/volume-throttle-requested"
                  else
                    MODIFY_COMMAND="echo __NO_ROOT_VOLUME_ID__; touch /tmp/volume-throttle-requested"
                  fi
                  MODIFY_CMD_ID=$(aws ssm send-command \
                    --instance-ids "$INSTANCE" \
                    --document-name AWS-RunShellScript \
                    --parameters "commands=[\"$MODIFY_COMMAND\"]" \
                    --query 'Command.CommandId' --output text)
                  aws ssm wait command-executed --command-id "$MODIFY_CMD_ID" --instance-id "$INSTANCE" 2>/dev/null || true
                  MODIFY_STDOUT=$(aws ssm get-command-invocation \
                    --command-id "$MODIFY_CMD_ID" --instance-id "$INSTANCE" \
                    --query StandardOutputContent --output text 2>/dev/null || echo "")
                  MODIFY_STDERR=$(aws ssm get-command-invocation \
                    --command-id "$MODIFY_CMD_ID" --instance-id "$INSTANCE" \
                    --query StandardErrorContent --output text 2>/dev/null || echo "")
                  echo "[$(date -u +%FT%TZ)] download complete; attempted root-volume throughput change to $BENCH_VOLUME_THROUGHPUT MiB/s for ${ROOT_VOLUME:-<unknown>}"
                  [ -z "$MODIFY_STDOUT" ] || printf '%s\n' "$MODIFY_STDOUT"
                  [ -z "$MODIFY_STDERR" ] || printf '%s\n' "$MODIFY_STDERR"
                  THROTTLE_ATTEMPTED=1
                fi
                echo "[$(date -u +%FT%TZ)] download stage complete; waiting for /tmp/done"
                sleep "$POLL_INTERVAL"
                continue
              fi
              printf '%s' "$OUT" > /tmp/results.md
              echo "found=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "[$(date -u +%FT%TZ)] still waiting for /tmp/done"
            sleep "$POLL_INTERVAL"
          done
          echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Post results to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.results.outputs.found }}" = "true" ]; then
            gh pr comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/results.md
          else
            gh pr comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "❌ Load test did not produce results within $RESULTS_TIMEOUT s.
            Instance: \`${{ steps.launch.outputs.instance_id }}\`
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

      - name: Terminate instance
        if: always() && steps.launch.outputs.instance_id != ''
        run: |
          aws ec2 terminate-instances \
            --instance-ids ${{ steps.launch.outputs.instance_id }} || true
