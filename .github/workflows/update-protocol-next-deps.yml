name: Update soroban-env curr deps

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
  pull_request:
    branches:
      - protocol-next
  schedule:
    - cron: '17 */6 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-soroban-env-curr:
    name: "Update soroban-env curr deps to latest tip"
    runs-on: ubuntu-latest
    env:
      BASE_BRANCH: protocol-next
      UPDATE_BRANCH: automation/bump-soroban-env
      SOROBAN_ENV_GIT_URL: https://github.com/stellar/rs-soroban-env
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-go
      - run: rustup update
      - uses: stellar/actions/rust-cache@main

      - name: Install tomlq
        run: |
          sudo apt update
          sudo apt install -y jq
          python3 -m pip install --user yq
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Convert `-curr` deps to git source on protocol-next
        run: |
          tomlq -t '
            .workspace.dependencies["soroban-env-host-curr"] = {
              "package": "soroban-env-host",
              "git": env.SOROBAN_ENV_GIT_URL,
              "branch": "main"
            }
            | .workspace.dependencies["soroban-simulation-curr"] = {
              "package": "soroban-simulation",
              "git": env.SOROBAN_ENV_GIT_URL,
              "branch": "main"
            }
          ' Cargo.toml > Cargo.toml.updated
          mv Cargo.toml.updated Cargo.toml

      - name: Update soroban-env curr lockfile entries
        run: |
          cargo update \
            -p 'https://github.com/stellar/rs-soroban-env#soroban-env-host' \
            -p 'https://github.com/stellar/rs-soroban-env#soroban-simulation'

      - name: Detect manifest or lockfile changes
        id: changes
        run: |
          git diff --quiet -- Cargo.toml Cargo.lock
          echo "changed=$?" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.changes.outputs.changed == '1'
        uses: peter-evans/create-pull-request@v7
        with:
          base: ${{ env.BASE_BRANCH }}
          branch: ${{ env.UPDATE_BRANCH }}
          delete-branch: true
          title: 'Bump current version of soroban-env to latest tip'
          commit-message: 'Bump current version of soroban-env to latest tip'
          body: Automated update for the `soroban-env` dependency on `${{ env.BASE_BRANCH }}`.
          add-paths: |
            Cargo.toml
            Cargo.lock
